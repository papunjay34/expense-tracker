name: PR Validation Pipeline

# ─── Triggers ───────────────────────────────────────────────────────────────
# Runs whenever a developer opens, updates, or reopens a PR targeting 'develop'
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# ─── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: write # Needed to trigger auto-merge
  pull-requests: write # Needed to post comments

# ─── Jobs ───────────────────────────────────────────────────────────────────
jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Lint: Static code analysis with ESLint
  # ════════════════════════════════════════════════════════════════
  lint:
    name: ESLint Code Quality
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.lint-run.outcome }}
      report: ${{ steps.lint-report.outputs.summary }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: lint-run
        continue-on-error: true # allow next steps to run even when errors found
        run: |
          ./node_modules/.bin/eslint . \
            --format json \
            --output-file eslint-results.json \
            --ignore-pattern "gen/**" \
            --ignore-pattern "node_modules/**"

      - name: Parse ESLint results into summary
        id: lint-report
        run: |
          node - <<'EOF'
          const fs   = require('fs');
          const path = require('path');

          if (!fs.existsSync('eslint-results.json')) {
            console.log('::set-output name=summary::No ESLint results found.');
            process.exit(0);
          }

          const results = JSON.parse(fs.readFileSync('eslint-results.json', 'utf8'));
          let totalErrors   = 0;
          let totalWarnings = 0;
          const lines = [];

          results.forEach(file => {
            if (file.errorCount === 0 && file.warningCount === 0) return;
            totalErrors   += file.errorCount;
            totalWarnings += file.warningCount;

            const rel = path.relative(process.cwd(), file.filePath);
            lines.push(`**${rel}** — ${file.errorCount} error(s), ${file.warningCount} warning(s)`);

            file.messages.forEach(m => {
              const sev = m.severity === 2 ? '[ERROR]' : '[WARN] ';
              lines.push(`  - \`L${m.line}:${m.column}\` ${sev} [${m.ruleId}]: ${m.message}`);
            });
          });

          let summary = '';
          if (totalErrors === 0 && totalWarnings === 0) {
            summary = 'No issues found.';
          } else {
            summary  = `${totalErrors} error(s) and ${totalWarnings} warning(s) detected.\n\n`;
            summary += lines.join('\n');
          }

          // GitHub Actions multiline output
          const output = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(output, `summary<<LINT_EOF\n${summary}\nLINT_EOF\n`);
          EOF

      - name: Upload ESLint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-results
          path: eslint-results.json
          retention-days: 7

      - name: Fail job if ESLint errors found
        if: steps.lint-run.outcome == 'failure'
        run: |
          echo "::error::ESLint found errors that must be fixed before this PR can be merged."
          echo "Check the 'Run ESLint' step output and the eslint-results.json artifact for file and line details."
          exit 1

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Build: Validate CDS build compiles cleanly
  # Gate: only runs if lint passed
  # ════════════════════════════════════════════════════════════════
  build:
    name: CDS Build Validation
    runs-on: ubuntu-latest
    needs: [lint]
    if: needs.lint.outputs.outcome == 'success'
    outputs:
      outcome: ${{ steps.cds-build.outcome }}
      report: ${{ steps.build-report.outputs.summary }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CDS build (production mode)
        id: cds-build
        run: |
          set -o pipefail  # ensures pipe exit code = cds build exit code, not tee
          npx cds build --production 2>&1 | tee build-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Generate build summary
        id: build-report
        if: always()
        run: |
          EXIT="${{ steps.cds-build.outputs.exit_code }}"
          if [ "$EXIT" = "0" ]; then
            SUMMARY="Build succeeded. No compilation errors detected."
          else
            ERRORS=$(grep -i "error" build-output.txt | head -20 || true)
            SUMMARY="Build failed.\n\n\`\`\`\n${ERRORS}\n\`\`\`"
          fi
          {
            echo "summary<<BUILD_EOF"
            echo -e "$SUMMARY"
            echo "BUILD_EOF"
          } >> $GITHUB_OUTPUT

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.txt
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Test: Run unit/integration tests
  # Gate: only runs if lint AND build both passed
  # ════════════════════════════════════════════════════════════════
  test:
    name: Automated Tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: needs.lint.outputs.outcome == 'success' && needs.build.outputs.outcome == 'success'
    outputs:
      outcome: ${{ steps.run-tests.outcome }}
      report: ${{ steps.test-report.outputs.summary }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: run-tests
        run: |
          # Check if a test script is defined in package.json (exit 1 when undefined)
          if node -e "const s=require('./package.json').scripts; if(!s||!s.test){process.exit(1)}" 2>/dev/null; then
            npm test 2>&1 | tee test-output.txt
            echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
            echo "ran=true" >> $GITHUB_OUTPUT
          else
            echo "ran=false" >> $GITHUB_OUTPUT
            echo "exit_code=0"  >> $GITHUB_OUTPUT
            echo "No test script." > test-output.txt
          fi
        continue-on-error: true

      - name: Generate test summary
        id: test-report
        if: always()
        run: |
          RAN="${{ steps.run-tests.outputs.ran }}"
          EXIT="${{ steps.run-tests.outputs.exit_code }}"

          if [ "$RAN" = "false" ]; then
            SUMMARY="No test script defined in package.json. Add a \"test\" script to enable automated testing."
          elif [ "$EXIT" = "0" ]; then
            SUMMARY="All tests passed."
          else
            FAILURES=$(grep -E "FAIL|Error|\u2717|\u00d7" test-output.txt | head -20 || true)
            SUMMARY="Tests failed.\n\n\`\`\`\n${FAILURES}\n\`\`\`"
          fi
          {
            echo "summary<<TEST_EOF"
            echo -e "$SUMMARY"
            echo "TEST_EOF"
          } >> $GITHUB_OUTPUT

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # JOB 4 — Report: Post a combined summary comment on the PR
  # FIX: outputs are passed via env vars (not template literals)
  #      so backticks/quotes in report text never break JS syntax.
  # ════════════════════════════════════════════════════════════════
  report:
    name: Post PR Review Comment
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    if: always()

    steps:
      - name: Post review comment
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ needs.lint.outputs.outcome }}
          BUILD_OUTCOME: ${{ needs.build.outputs.outcome }}
          TEST_OUTCOME: ${{ needs.test.outputs.outcome }}
          LINT_REPORT: ${{ needs.lint.outputs.report }}
          BUILD_REPORT: ${{ needs.build.outputs.report }}
          TEST_REPORT: ${{ needs.test.outputs.report }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const lintOutcome  = process.env.LINT_OUTCOME  || '';
            const buildOutcome = process.env.BUILD_OUTCOME || '';
            const testOutcome  = process.env.TEST_OUTCOME  || '';
            const lintReport   = process.env.LINT_REPORT   || 'Not available.';
            const buildReport  = process.env.BUILD_REPORT  || 'Not available.';
            const testReport   = process.env.TEST_REPORT   || 'Not available.';

            const allPassed =
              lintOutcome  === 'success' &&
              buildOutcome === 'success' &&
              (testOutcome === 'success' || testOutcome === '');

            const fmt = o =>
              o === 'success' ? 'PASSED'  :
              o === 'failure' ? 'FAILED'  : 'SKIPPED';

            const actionItems = [];
            if (lintOutcome === 'failure') {
              actionItems.push(
                '**ESLint**',
                '- Run `npx eslint . --fix` locally to resolve linting errors.',
                '- Review the ESLint analysis section below for file and line details.',
                ''
              );
            }
            if (buildOutcome === 'failure') {
              actionItems.push(
                '**Build**',
                '- Run `npx cds build --production` locally to reproduce the error.',
                '- Check `.cds` files for syntax errors or unresolved entity references.',
                ''
              );
            }
            if (testOutcome === 'failure') {
              actionItems.push(
                '**Tests**',
                '- Run `npm test` locally to reproduce failures.',
                '- Verify mock data in `db/data/` matches the current schema.',
                ''
              );
            }

            const actionBlock = actionItems.length > 0
              ? '\n### Required Actions\n\n' + actionItems.join('\n') +
                '\nPush a fix to this branch. The pipeline will re-run automatically.\n'
              : '';

            const body = [
              '## CI Pipeline Report',
              '',
              `**Status:** ${allPassed ? 'PASSED' : 'FAILED'}`,
              `**Branch:** \`${context.payload.pull_request.head.ref}\` -> \`main\``,
              `**Triggered by:** ${context.actor}`,
              '',
              '---',
              '',
              '### Check Results',
              '',
              '| Check      | Status  |',
              '|------------|---------|',
              `| ESLint     | ${fmt(lintOutcome)}  |`,
              `| CDS Build  | ${fmt(buildOutcome)} |`,
              `| Tests      | ${fmt(testOutcome)}  |`,
              '',
              actionBlock,
              '---',
              '',
              '### ESLint Analysis',
              '',
              lintReport,
              '',
              '### Build Output',
              '',
              buildReport,
              '',
              '### Test Results',
              '',
              testReport,
              '',
              '---',
              `*Generated by GitHub Actions | ${new Date().toUTCString()}*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });
            const prev = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Generated by GitHub Actions')
            );
            if (prev) {
              await github.rest.issues.deleteComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: prev.id,
              });
            }
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # JOB 5 — Code review: pipeline verdict + PR overview + Copilot handoff
  code-review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    needs: [lint, build, test, report]
    if: always() && needs.report.result != 'skipped'
    outputs:
      all_passed: ${{ steps.review.outputs.all_passed }}

    steps:
      - name: Post review verdict and request Copilot analysis
        id: review
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ needs.lint.outputs.outcome }}
          BUILD_OUTCOME: ${{ needs.build.outputs.outcome }}
          TEST_OUTCOME: ${{ needs.test.outputs.outcome }}
          LINT_REPORT: ${{ needs.lint.outputs.report }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const lintOutcome  = process.env.LINT_OUTCOME  || '';
            const buildOutcome = process.env.BUILD_OUTCOME || '';
            const testOutcome  = process.env.TEST_OUTCOME  || '';
            const lintReport   = process.env.LINT_REPORT   || '';

            const allPassed =
              lintOutcome  === 'success' &&
              buildOutcome === 'success' &&
              (testOutcome === 'success' || testOutcome === '');

            core.setOutput('all_passed', allPassed ? 'true' : 'false');

            // ── Fetch PR metadata and changed files ───────────────────────────
            const { data: pr } = await github.rest.pulls.get({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: context.issue.number,
            });

            const { data: files } = await github.rest.pulls.listFiles({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: context.issue.number,
              per_page:    100,
            });

            // ── PR Overview ───────────────────────────────────────────────────
            const totalAdditions = files.reduce((s, f) => s + f.additions, 0);
            const totalDeletions = files.reduce((s, f) => s + f.deletions, 0);

            const fileList = files.map(f => {
              const tag =
                f.status === 'added'   ? 'ADDED'    :
                f.status === 'removed' ? 'REMOVED'  : 'MODIFIED';
              return `| \`${f.filename}\` | ${tag} | +${f.additions} / -${f.deletions} |`;
            }).join('\n');

            // ── Pipeline result table ─────────────────────────────────────────
            const fmt = o =>
              o === 'success' ? 'PASSED'  :
              o === 'failure' ? 'FAILED'  : 'SKIPPED';

            const checkTable = [
              '| Check      | Result  |',
              '|------------|---------|',
              `| ESLint     | ${fmt(lintOutcome)}  |`,
              `| CDS Build  | ${fmt(buildOutcome)} |`,
              `| Tests      | ${fmt(testOutcome)}  |`,
            ].join('\n');

            // ── Build review comment ──────────────────────────────────────────
            const verdict = allPassed ? 'APPROVED' : 'CHANGES REQUIRED';

            const sections = [
              '## Automated Code Review',
              '',
              `**Verdict:** ${verdict}`,
              '',
              '---',
              '',
              '### Pipeline Results',
              '',
              checkTable,
              '',
              '---',
              '',
              '### PR Overview',
              '',
              `**Title:** ${pr.title}`,
              `**Author:** ${pr.user.login}`,
              `**Files changed:** ${files.length} | **Lines added:** +${totalAdditions} | **Lines removed:** -${totalDeletions}`,
              '',
              '| File | Status | Changes |',
              '|------|--------|---------|',
              fileList,
              '',
              '---',
              '',
              '### Code Review — GitHub Copilot',
              '',
              'GitHub Copilot has been assigned as a reviewer on this pull request.',
              'Copilot will analyse the diff for:',
              '',
              '- Code quality and best practices',
              '- Error handling and input validation',
              '- Performance and scalability concerns',
              '- Security vulnerabilities',
              '',
              'See the **Copilot review** in the Reviewers section of this PR for inline comments and findings.',
            ];

            // ── Required actions if checks failed ────────────────────────────
            if (!allPassed) {
              const actions = [];
              if (lintOutcome  !== 'success') actions.push('**ESLint** — Run `npx eslint . --fix` locally to fix auto-fixable issues, then fix remaining errors manually.');
              if (buildOutcome !== 'success') actions.push('**Build** — Run `npx cds build --production` locally to reproduce the error.');
              if (testOutcome  !== 'success' && testOutcome !== '') actions.push('**Tests** — Run `npm test` locally to reproduce failures.');

              sections.push(
                '', '---', '',
                '### Issues Found — Fix Required',
                '',
                actions.join('\n\n'),
              );

              // ── Include exact ESLint errors so the problem is visible in the review ──
              if (lintOutcome !== 'success' && lintReport) {
                sections.push(
                  '',
                  '**ESLint Errors Detected:**',
                  '',
                  lintReport,
                  '',
                  '> These errors must be resolved. Undefined variables (e.g. a typo like `thi` instead of `this`) will be caught by the `no-undef` rule and will block the merge.',
                );
              }

              sections.push(
                '',
                'Push a fix to this branch. The pipeline will re-run automatically.',
              );
            }

            sections.push('', '---', `*Automated review by GitHub Actions | ${new Date().toUTCString()}*`);

            // ── Submit review: REQUEST_CHANGES blocks auto-merge; COMMENT is advisory ──
            await github.rest.pulls.createReview({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: context.issue.number,
              event:       allPassed ? 'COMMENT' : 'REQUEST_CHANGES',
              body:        sections.join('\n'),
            });

            // ── Request Copilot as reviewer (if not already assigned) ─────────
            try {
              await github.rest.pulls.requestReviewers({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                pull_number: context.issue.number,
                reviewers:   ['Copilot'],
              });
            } catch (e) {
              core.warning('Could not assign Copilot reviewer: ' + e.message);
            }

  # JOB 6 — Auto-Merge: Squash-merge when all checks pass
  auto-merge:
    name: Auto-Merge PR
    runs-on: ubuntu-latest
    needs: [lint, build, test, code-review]
    if: |
      needs.lint.outputs.outcome  == 'success' &&
      needs.build.outputs.outcome == 'success' &&
      (needs.test.outputs.outcome == 'success' || needs.test.outputs.outcome == '') &&
      needs.code-review.outputs.all_passed == 'true'

    steps:
      - name: Squash-merge via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title -q .title)

          gh pr merge "$PR_NUMBER" \
            --repo    "$REPO" \
            --auto \
            --squash \
            --subject "${PR_TITLE}" \
            --body    "Auto-merged after all pipeline checks passed (lint + build + tests)."

          echo "Auto-merge queued for PR #${PR_NUMBER}: ${PR_TITLE}"
