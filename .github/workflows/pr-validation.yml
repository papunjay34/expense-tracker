name: PR Validation Pipeline

# ─── Triggers ───────────────────────────────────────────────────────────────
# Runs whenever a developer opens, updates, or reopens a PR targeting 'develop'
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# ─── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: write # Needed to trigger auto-merge
  pull-requests: write # Needed to post comments

# ─── Jobs ───────────────────────────────────────────────────────────────────
jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Lint: Static code analysis with ESLint
  # ════════════════════════════════════════════════════════════════
  lint:
    name: 🔍 ESLint Code Quality
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.lint-run.outcome }}
      report: ${{ steps.lint-report.outputs.summary }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: lint-run
        run: |
          ./node_modules/.bin/eslint . \
            --format json \
            --output-file eslint-results.json \
            --ignore-pattern "gen/**" \
            --ignore-pattern "node_modules/**" || true

      - name: Parse ESLint results into summary
        id: lint-report
        run: |
          node - <<'EOF'
          const fs   = require('fs');
          const path = require('path');

          if (!fs.existsSync('eslint-results.json')) {
            console.log('::set-output name=summary::No ESLint results found.');
            process.exit(0);
          }

          const results = JSON.parse(fs.readFileSync('eslint-results.json', 'utf8'));
          let totalErrors   = 0;
          let totalWarnings = 0;
          const lines = [];

          results.forEach(file => {
            if (file.errorCount === 0 && file.warningCount === 0) return;
            totalErrors   += file.errorCount;
            totalWarnings += file.warningCount;

            const rel = path.relative(process.cwd(), file.filePath);
            lines.push(`**${rel}** — ${file.errorCount} error(s), ${file.warningCount} warning(s)`);

            file.messages.forEach(m => {
              const sev = m.severity === 2 ? '❌ ERROR' : '⚠️ WARN';
              lines.push(`  - \`L${m.line}:${m.column}\` ${sev} [${m.ruleId}]: ${m.message}`);
            });
          });

          let summary = '';
          if (totalErrors === 0 && totalWarnings === 0) {
            summary = '✅ No lint issues found.';
          } else {
            summary  = `❌ **${totalErrors} error(s)** and ⚠️ **${totalWarnings} warning(s)** detected.\n\n`;
            summary += lines.join('\n');
          }

          // GitHub Actions multiline output
          const output = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(output, `summary<<LINT_EOF\n${summary}\nLINT_EOF\n`);
          EOF

      - name: Upload ESLint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-results
          path: eslint-results.json
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Build: Validate CDS build compiles cleanly
  # ════════════════════════════════════════════════════════════════
  build:
    name: 🏗️ CDS Build Validation
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.cds-build.outcome }}
      report: ${{ steps.build-report.outputs.summary }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CDS build (production mode)
        id: cds-build
        run: |
          set -o pipefail  # ensures pipe exit code = cds build exit code, not tee
          npx cds build --production 2>&1 | tee build-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Generate build summary
        id: build-report
        if: always()
        run: |
          EXIT="${{ steps.cds-build.outputs.exit_code }}"
          if [ "$EXIT" = "0" ]; then
            SUMMARY="✅ CDS build succeeded — the project compiles without errors."
          else
            ERRORS=$(grep -i "error" build-output.txt | head -20 || true)
            SUMMARY="❌ CDS build **failed**.\n\n\`\`\`\n${ERRORS}\n\`\`\`"
          fi
          {
            echo "summary<<BUILD_EOF"
            echo -e "$SUMMARY"
            echo "BUILD_EOF"
          } >> $GITHUB_OUTPUT

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.txt
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Test: Run unit/integration tests
  # ════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Automated Tests
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.run-tests.outcome }}
      report: ${{ steps.test-report.outputs.summary }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: run-tests
        run: |
          # Check if a test script is defined in package.json (exit 1 when undefined)
          if node -e "const s=require('./package.json').scripts; if(!s||!s.test){process.exit(1)}" 2>/dev/null; then
            npm test 2>&1 | tee test-output.txt
            echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
            echo "ran=true" >> $GITHUB_OUTPUT
          else
            echo "ran=false" >> $GITHUB_OUTPUT
            echo "exit_code=0"  >> $GITHUB_OUTPUT
            echo "⚠️ No test script configured in package.json" > test-output.txt
          fi
        continue-on-error: true

      - name: Generate test summary
        id: test-report
        if: always()
        run: |
          RAN="${{ steps.run-tests.outputs.ran }}"
          EXIT="${{ steps.run-tests.outputs.exit_code }}"

          if [ "$RAN" = "false" ]; then
            SUMMARY="⚠️ **No test script found** in \`package.json\`.\n\n> 💡 **Suggestion:** Add a \`\"test\"\` script and write unit tests using \`@cap-js/sqlite\` in-memory for your CAP entities."
          elif [ "$EXIT" = "0" ]; then
            SUMMARY="✅ All tests passed."
          else
            FAILURES=$(grep -E "FAIL|Error|✗|×" test-output.txt | head -20 || true)
            SUMMARY="❌ **Tests failed.**\n\n\`\`\`\n${FAILURES}\n\`\`\`"
          fi
          {
            echo "summary<<TEST_EOF"
            echo -e "$SUMMARY"
            echo "TEST_EOF"
          } >> $GITHUB_OUTPUT

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # JOB 4 — Report: Post a combined summary comment on the PR
  # FIX: outputs are passed via env vars (not template literals)
  #      so backticks/quotes in report text never break JS syntax.
  # ════════════════════════════════════════════════════════════════
  report:
    name: 📋 Post PR Review Comment
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    if: always()

    steps:
      - name: Post review comment
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ needs.lint.outputs.outcome }}
          BUILD_OUTCOME: ${{ needs.build.outputs.outcome }}
          TEST_OUTCOME: ${{ needs.test.outputs.outcome }}
          LINT_REPORT: ${{ needs.lint.outputs.report }}
          BUILD_REPORT: ${{ needs.build.outputs.report }}
          TEST_REPORT: ${{ needs.test.outputs.report }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Read from env vars — safe for any string content (backticks, quotes, etc.)
            const lintOutcome  = process.env.LINT_OUTCOME  || '';
            const buildOutcome = process.env.BUILD_OUTCOME || '';
            const testOutcome  = process.env.TEST_OUTCOME  || '';
            const lintReport   = process.env.LINT_REPORT   || '_Not available_';
            const buildReport  = process.env.BUILD_REPORT  || '_Not available_';
            const testReport   = process.env.TEST_REPORT   || '_Not available_';

            const allPassed =
              lintOutcome  === 'success' &&
              buildOutcome === 'success' &&
              (testOutcome === 'success' || testOutcome === '');

            const statusBadge = allPassed
              ? '## ✅ All Checks Passed — Awaiting Code Review'
              : '## ❌ Some Checks Failed — Please Fix Before Merging';

            const suggestions = [];
            if (lintOutcome !== 'success') {
              suggestions.push(
                '### 💡 ESLint Suggestions',
                '- Fix all errors before merging (warnings are acceptable but should be addressed).',
                '- Run `npx eslint . --fix` locally to auto-fix many common issues.',
                '- See the [ESLint rule reference](https://eslint.org/docs/rules/) for rule details.'
              );
            }
            if (buildOutcome !== 'success') {
              suggestions.push(
                '### 💡 Build Suggestions',
                '- Run `npx cds build --production` locally to reproduce the error.',
                '- Check your `.cds` files for syntax errors or unresolved associations.',
                '- Ensure all `@sap/cds` imports and entity references are correctly defined.'
              );
            }
            if (testOutcome !== 'success' && testOutcome !== '') {
              suggestions.push(
                '### 💡 Test Suggestions',
                '- Run `npm test` locally to reproduce failures.',
                '- Verify mock data in `db/data/` is consistent with schema changes.',
                '- Add/update tests for any new service handlers in this PR.'
              );
            }

            const suggestionBlock = suggestions.length > 0
              ? '\n---\n## 🛠️ Automated Suggestions\n' + suggestions.join('\n')
              : '';

            const lintCell  = lintOutcome  === 'success' ? '✅ Passed' : '❌ Failed';
            const buildCell = buildOutcome === 'success' ? '✅ Passed' : '❌ Failed';
            const testCell  = testOutcome  === 'success' ? '✅ Passed'
                            : testOutcome  === ''        ? '⚠️ Skipped' : '❌ Failed';

            const body = [
              statusBadge, '',
              '---',
              '### 📊 Check Results', '',
              '| Check | Status |',
              '|-------|--------|',
              '| 🔍 ESLint | ' + lintCell  + ' |',
              '| 🏗️ Build  | ' + buildCell + ' |',
              '| 🧪 Tests  | ' + testCell  + ' |',
              '',
              '---',
              '### 🔍 ESLint Report', lintReport,  '',
              '### 🏗️ Build Report',  buildReport, '',
              '### 🧪 Test Report',   testReport,
              suggestionBlock, '',
              '---',
              '> _Automated review by GitHub Actions pipeline • ' + new Date().toUTCString() + '_',
            ].join('\n');

            // Replace previous bot comment (keep PR clean)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const prev = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Automated review by GitHub Actions pipeline')
            );
            if (prev) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: prev.id,
              });
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ════════════════════════════════════════════════════════════════
  # JOB 5 — Code Review: Post an informational PR review comment
  # Uses event:'COMMENT' — works even when the PR was created by
  # github-actions[bot] (avoids "cannot approve own PR" error).
  # Auto-merge is gated on check outcomes, not on APPROVE event.
  # ════════════════════════════════════════════════════════════════
  code-review:
    name: 🔎 Automated Code Review
    runs-on: ubuntu-latest
    needs: [lint, build, test, report]
    if: always() && needs.report.result != 'skipped'
    outputs:
      all_passed: ${{ steps.review.outputs.all_passed }}

    steps:
      - name: Post code review comment
        id: review
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME:  ${{ needs.lint.outputs.outcome }}
          BUILD_OUTCOME: ${{ needs.build.outputs.outcome }}
          TEST_OUTCOME:  ${{ needs.test.outputs.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const lintOutcome  = process.env.LINT_OUTCOME  || '';
            const buildOutcome = process.env.BUILD_OUTCOME || '';
            const testOutcome  = process.env.TEST_OUTCOME  || '';

            const allPassed =
              lintOutcome  === 'success' &&
              buildOutcome === 'success' &&
              (testOutcome === 'success' || testOutcome === '');

            core.setOutput('all_passed', allPassed ? 'true' : 'false');

            const lintLine  = '| 🔍 ESLint | ' + (lintOutcome  === 'success' ? '✅ Pass' : '❌ Fail') + ' |';
            const buildLine = '| 🏗️ Build  | ' + (buildOutcome === 'success' ? '✅ Pass' : '❌ Fail') + ' |';
            const testLine  = '| 🧪 Tests  | ' + (testOutcome  === 'success' ? '✅ Pass'
                             : testOutcome === '' ? '⚠️ Skip' : '❌ Fail') + ' |';

            let reviewBody;
            if (allPassed) {
              reviewBody = [
                '## ✅ Automated Code Review — All Checks Passed',
                '',
                'All automated checks passed. This PR will be auto-merged.',
                '',
                '| Check | Result |',
                '|-------|--------|',
                lintLine, buildLine, testLine,
                '',
                '> The PR will be squash-merged into `main` automatically.',
              ].join('\n');
            } else {
              const issues = [];
              if (lintOutcome !== 'success')
                issues.push('- **ESLint**: Fix lint errors. Run `npx eslint . --fix` locally.');
              if (buildOutcome !== 'success')
                issues.push('- **Build**: Run `npx cds build --production` locally to identify the error.');
              if (testOutcome !== 'success' && testOutcome !== '')
                issues.push('- **Tests**: Run `npm test` locally. Update tests/fixtures if schema changed.');

              reviewBody = [
                '## ❌ Automated Code Review — Action Required',
                '',
                'The following issues must be resolved before this PR can be merged:',
                '',
                issues.join('\n'),
                '',
                '| Check | Result |',
                '|-------|--------|',
                lintLine, buildLine, testLine,
                '',
                '> Push a fix to this branch — the pipeline will re-run automatically.',
              ].join('\n');
            }

            // Always use COMMENT — avoids "cannot approve own PR" GitHub restriction
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.issue.number,
              event: 'COMMENT',
              body:  reviewBody,
            });

  # ════════════════════════════════════════════════════════════════
  # JOB 6 — Auto-Merge: Squash-merge when all checks pass
  # Gated on check outcomes directly — no formal approval needed.
  # Requires: Settings → General → Allow auto-merge ✅
  # ════════════════════════════════════════════════════════════════
  auto-merge:
    name: 🔀 Auto-Merge PR
    runs-on: ubuntu-latest
    needs: [lint, build, test, code-review]
    if: |
      needs.lint.outputs.outcome  == 'success' &&
      needs.build.outputs.outcome == 'success' &&
      (needs.test.outputs.outcome == 'success' || needs.test.outputs.outcome == '') &&
      needs.code-review.outputs.all_passed == 'true'

    steps:
      - name: Squash-merge via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title -q .title)

          gh pr merge "$PR_NUMBER" \
            --repo    "$REPO" \
            --auto \
            --squash \
            --subject "${PR_TITLE}" \
            --body    "Auto-merged after all pipeline checks passed (lint + build + tests)."

          echo "Auto-merge queued for PR #${PR_NUMBER}: ${PR_TITLE}"
