name: PR Validation Pipeline

# ─── Triggers ───────────────────────────────────────────────────────────────
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# ─── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: write
  pull-requests: write

# ─── Jobs ───────────────────────────────────────────────────────────────────
jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Build: Validate CDS build compiles cleanly
  # ════════════════════════════════════════════════════════════════
  build:
    name: CDS Build Validation
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.cds-build.outcome }}
      report: ${{ steps.build-report.outputs.summary }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CDS build (production mode)
        id: cds-build
        run: |
          set -o pipefail
          npx cds build --production 2>&1 | tee build-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Generate build summary
        id: build-report
        if: always()
        run: |
          EXIT="${{ steps.cds-build.outputs.exit_code }}"
          if [ "$EXIT" = "0" ]; then
            SUMMARY="Build succeeded. No compilation errors detected."
          else
            ERRORS=$(grep -i "error" build-output.txt | head -20 || true)
            SUMMARY="Build failed.\n\n\`\`\`\n${ERRORS}\n\`\`\`"
          fi
          {
            echo "summary<<BUILD_EOF"
            echo -e "$SUMMARY"
            echo "BUILD_EOF"
          } >> $GITHUB_OUTPUT

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.txt
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Test: Run unit/integration tests
  # Gate: only runs if lint AND build both passed
  # ════════════════════════════════════════════════════════════════
  test:
    name: Automated Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: needs.build.outputs.outcome == 'success'
    outputs:
      outcome: ${{ steps.run-tests.outcome }}
      report: ${{ steps.test-report.outputs.summary }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: run-tests
        run: |
          if node -e "const s=require('./package.json').scripts; if(!s||!s.test){process.exit(1)}" 2>/dev/null; then
            npm test 2>&1 | tee test-output.txt
            echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
            echo "ran=true" >> $GITHUB_OUTPUT
          else
            echo "ran=false" >> $GITHUB_OUTPUT
            echo "exit_code=0"  >> $GITHUB_OUTPUT
            echo "No test script." > test-output.txt
          fi
        continue-on-error: true

      - name: Generate test summary
        id: test-report
        if: always()
        run: |
          RAN="${{ steps.run-tests.outputs.ran }}"
          EXIT="${{ steps.run-tests.outputs.exit_code }}"
          if [ "$RAN" = "false" ]; then
            SUMMARY="No test script defined in package.json. Add a \"test\" script to enable automated testing."
          elif [ "$EXIT" = "0" ]; then
            SUMMARY="All tests passed."
          else
            FAILURES=$(grep -E "FAIL|Error" test-output.txt | head -20 || true)
            SUMMARY="Tests failed.\n\n\`\`\`\n${FAILURES}\n\`\`\`"
          fi
          {
            echo "summary<<TEST_EOF"
            echo -e "$SUMMARY"
            echo "TEST_EOF"
          } >> $GITHUB_OUTPUT

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # JOB 4 — Report: Post a combined CI summary comment on the PR
  # ════════════════════════════════════════════════════════════════
  report:
    name: Post PR Review Comment
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()

    steps:
      - name: Post review comment
        uses: actions/github-script@v7
        env:
          BUILD_OUTCOME: ${{ needs.build.outputs.outcome }}
          TEST_OUTCOME: ${{ needs.test.outputs.outcome }}
          BUILD_REPORT: ${{ needs.build.outputs.report }}
          TEST_REPORT: ${{ needs.test.outputs.report }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const buildOutcome = process.env.BUILD_OUTCOME || '';
            const testOutcome  = process.env.TEST_OUTCOME  || '';
            const buildReport  = process.env.BUILD_REPORT  || 'Not available.';
            const testReport   = process.env.TEST_REPORT   || 'Not available.';

            const allPassed =
              buildOutcome === 'success' &&
              (testOutcome === 'success' || testOutcome === '');

            const fmt = o =>
              o === 'success' ? 'PASSED' :
              o === 'failure' ? 'FAILED' : 'SKIPPED';

            // ── Action items when checks fail ─────────────────────────────────
            const actionItems = [];
            if (buildOutcome === 'failure') {
              actionItems.push(
                '**Build**',
                '- Run `npx cds build --production` locally to reproduce the error.',
                '- Check `.cds` files for syntax errors or unresolved entity references.',
                ''
              );
            }
            if (testOutcome === 'failure') {
              actionItems.push(
                '**Tests**',
                '- Run `npm test` locally to reproduce failures.',
                '- Verify mock data in `db/data/` matches the current schema.',
                ''
              );
            }

            const actionBlock = actionItems.length > 0
              ? '\n### Required Actions\n\n' + actionItems.join('\n') +
                '\nPush a fix to this branch. The pipeline will re-run automatically.\n'
              : '';

            const body = [
              '## CI Pipeline Report',
              '',
              '**Status:** ' + (allPassed ? 'PASSED' : 'FAILED'),
              '**Branch:** `' + context.payload.pull_request.head.ref + '` -> `main`',
              '**Triggered by:** ' + context.actor,
              '',
              '---',
              '',
              '### Check Results',
              '',
              '| Check      | Status  |',
              '|------------|---------|',
              '| CDS Build  | ' + fmt(buildOutcome) + ' |',
              '| Tests      | ' + fmt(testOutcome) + '  |',
              '',
              actionBlock,
              '---',
              '',
              '### Build Output',
              '',
              buildReport,
              '',
              '### Test Results',
              '',
              testReport,
              '',
              '---',
              '*Generated by GitHub Actions | ' + new Date().toUTCString() + '*',
            ].join('\n');

            // ── Replace previous bot comment ──────────────────────────────────
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const prev = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('CI Pipeline Report')
            );
            if (prev) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: prev.id,
              });
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });

  # ════════════════════════════════════════════════════════════════
  # JOB 5 — Code Review: Senior developer-level review + Copilot
  # Runs always — posts verdict, detailed findings, and assigns
  # GitHub Copilot as reviewer for deep semantic analysis.
  # ════════════════════════════════════════════════════════════════
  code-review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    needs: [build, test, report]
    if: always() && needs.report.result != 'skipped'
    outputs:
      all_passed: ${{ steps.review.outputs.all_passed }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post senior-level code review and assign Copilot
        id: review
        uses: actions/github-script@v7
        env:
          BUILD_OUTCOME: ${{ needs.build.outputs.outcome }}
          TEST_OUTCOME: ${{ needs.test.outputs.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');
            const buildOutcome = process.env.BUILD_OUTCOME || '';
            const testOutcome  = process.env.TEST_OUTCOME  || '';

            const allPassed =
              buildOutcome === 'success' &&
              (testOutcome === 'success' || testOutcome === '');

            core.setOutput('all_passed', allPassed ? 'true' : 'false');

            // ── Fetch PR metadata and changed files ───────────────────────────
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.issue.number, per_page: 100,
            });

            const totalAdditions = files.reduce((s, f) => s + f.additions, 0);
            const totalDeletions = files.reduce((s, f) => s + f.deletions, 0);

            const fileList = files.map(f => {
              const tag = f.status === 'added' ? 'ADDED' : f.status === 'removed' ? 'REMOVED' : 'MODIFIED';
              return '| `' + f.filename + '` | ' + tag + ' | +' + f.additions + ' / -' + f.deletions + ' |';
            }).join('\n');

            // ── Pipeline result formatting ────────────────────────────────────
            const fmt = o => o === 'success' ? 'PASSED' : o === 'failure' ? 'FAILED' : 'SKIPPED';
            const verdict = allPassed ? 'APPROVED' : 'CHANGES REQUIRED';

            // ── Build review body ─────────────────────────────────────────────
            const sections = [
              '## Automated Code Review',
              '',
              '**Verdict:** ' + verdict,
              '',
              '---',
              '',
              '### Pipeline Results',
              '',
              '| Check      | Result  |',
              '|------------|---------|',
              '| CDS Build  | ' + fmt(buildOutcome) + ' |',
              '| Tests      | ' + fmt(testOutcome) + '  |',
              '',
              '---',
              '',
              '### PR Overview',
              '',
              '**Title:** ' + pr.title,
              '**Author:** ' + pr.user.login,
              '**Files changed:** ' + files.length + ' | **Lines added:** +' + totalAdditions + ' | **Lines removed:** -' + totalDeletions,
              '',
              '| File | Status | Changes |',
              '|------|--------|---------|',
              fileList,
            ];

            // ── Required actions if checks failed ─────────────────────────────
            if (!allPassed) {
              const actions = [];
              if (buildOutcome !== 'success') actions.push('- **Build** — Run `npx cds build --production` locally to reproduce the error.');
              if (testOutcome  !== 'success' && testOutcome !== '') actions.push('- **Tests** — Run `npm test` locally to reproduce failures.');
              sections.push(
                '', '---', '',
                '### Actions Required',
                '',
                ...actions,
                '',
                'Push a fix to this branch. The pipeline will re-run automatically.',
              );
            }

            // ── Copilot review section ────────────────────────────────────────
            sections.push(
              '', '---', '',
              '### Code Review — GitHub Copilot',
              '',
              'GitHub Copilot has been assigned as a reviewer on this pull request.',
              'Copilot performs a senior developer-level review covering:',
              '',
              '- **Code correctness** — undefined variables, typos, logic errors',
              '- **Error handling** — missing try/catch, unhandled edge cases',
              '- **Performance** — N+1 queries, unnecessary loops, memory leaks',
              '- **Security** — input validation, injection risks, auth gaps',
              '- **Best practices** — naming conventions, code structure, readability',
              '',
              'Check the **Copilot review** in the Reviewers section of this PR for inline comments.',
              '',
              '---',
              '*Automated review by GitHub Actions | ' + new Date().toUTCString() + '*',
            );

            // ── Submit review ─────────────────────────────────────────────────
            // REQUEST_CHANGES blocks merge when issues found; COMMENT is advisory
            await github.rest.pulls.createReview({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.issue.number,
              event: allPassed ? 'COMMENT' : 'REQUEST_CHANGES',
              body:  sections.join('\n'),
            });

            // ── Request Copilot as reviewer ───────────────────────────────────
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: ['Copilot'],
              });
            } catch (e) {
              core.warning('Could not assign Copilot reviewer: ' + e.message);
            }

  # ════════════════════════════════════════════════════════════════
  # JOB 6 — Auto-Merge: Squash-merge only when ALL checks pass
  # ════════════════════════════════════════════════════════════════
  auto-merge:
    name: Auto-Merge PR
    runs-on: ubuntu-latest
    needs: [build, test, code-review]
    if: |
      needs.build.outputs.outcome == 'success' &&
      (needs.test.outputs.outcome == 'success' || needs.test.outputs.outcome == '') &&
      needs.code-review.outputs.all_passed == 'true'

    steps:
      - name: Squash-merge via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title -q .title)

          gh pr merge "$PR_NUMBER" \
            --repo    "$REPO" \
            --auto \
            --squash \
            --subject "${PR_TITLE}" \
            --body    "Auto-merged after all pipeline checks passed (build + tests + code review)."

          echo "Auto-merge queued for PR #${PR_NUMBER}: ${PR_TITLE}"
