name: Auto Create Pull Request

# ─── Triggers ────────────────────────────────────────────────────────────────
# Fires whenever a developer pushes to any branch except develop and main
on:
  push:
    branches-ignore:
      - develop
      - main

# ─── Permissions ─────────────────────────────────────────────────────────────
permissions:
  contents: read
  pull-requests: write

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:
  create-pr:
    name: 🔀 Auto-Create PR → develop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect git info
        id: git-info
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          # ── Title: feat/add-budget-report → "feat: add budget report" ─────
          PREFIX=$(echo "$BRANCH" | sed 's|/.*||')
          SLUG=$(echo "$BRANCH" | sed 's|[^/]*/||')
          READABLE=$(echo "$SLUG" | tr '-' ' ')
          TITLE="${PREFIX}: ${READABLE}"

          # ── Commits not yet in develop ────────────────────────────────────
          git fetch origin develop 2>/dev/null || true
          COMMITS=$(git log origin/develop..HEAD --oneline --no-merges 2>/dev/null | head -20 || true)
          [ -z "$COMMITS" ] && COMMITS="No new commits compared to develop."

          # ── Changed files by area ─────────────────────────────────────────
          CHANGED=$(git diff --name-only origin/develop...HEAD 2>/dev/null | head -30 || true)
          DB_FILES=$(echo "$CHANGED"    | grep "^db/"   | sed 's/^/- /' || true)
          SRV_FILES=$(echo "$CHANGED"   | grep "^srv/"  | sed 's/^/- /' || true)
          TEST_FILES=$(echo "$CHANGED"  | grep "^test/" | sed 's/^/- /' || true)
          OTHER_FILES=$(echo "$CHANGED" | grep -vE "^(db|srv|test)/" | sed 's/^/- /' || true)

          # ── Write PR body to a temp file (no heredoc — avoids YAML parse issues) ──
          BODY_FILE="$(mktemp /tmp/pr-body.XXXXXX.md)"

          # Static template written line-by-line so YAML indentation is never broken
          echo "## Summary"                                          > "$BODY_FILE"
          echo "Automated PR - update the summary below before merging." >> "$BODY_FILE"
          echo ""                                                   >> "$BODY_FILE"
          echo "## Type of Change"                                  >> "$BODY_FILE"
          echo "- [ ] Bug fix"                                      >> "$BODY_FILE"
          echo "- [ ] New feature"                                  >> "$BODY_FILE"
          echo "- [ ] Refactor"                                     >> "$BODY_FILE"
          echo "- [ ] Documentation"                                >> "$BODY_FILE"
          echo "- [ ] Config / CI"                                  >> "$BODY_FILE"
          echo ""                                                   >> "$BODY_FILE"
          echo "## Checklist"                                       >> "$BODY_FILE"
          echo "- [ ] Ran cds watch locally and tested manually"    >> "$BODY_FILE"
          echo "- [ ] npx eslint . passes locally"                  >> "$BODY_FILE"
          echo "- [ ] npx cds build --production passes locally"    >> "$BODY_FILE"
          echo "- [ ] Linked to related issue (if any): Closes #___" >> "$BODY_FILE"

          # Append dynamic sections
          echo ""                                       >> "$BODY_FILE"
          echo "---"                                    >> "$BODY_FILE"
          echo "## Commits in this PR"                  >> "$BODY_FILE"
          echo '```'                                    >> "$BODY_FILE"
          echo "$COMMITS"                               >> "$BODY_FILE"
          echo '```'                                    >> "$BODY_FILE"

          echo ""                                       >> "$BODY_FILE"
          echo "## Changed Files"                       >> "$BODY_FILE"
          [ -n "$DB_FILES"    ] && echo "**db/**"    >> "$BODY_FILE" && echo "$DB_FILES"    >> "$BODY_FILE"
          [ -n "$SRV_FILES"   ] && echo "**srv/**"   >> "$BODY_FILE" && echo "$SRV_FILES"   >> "$BODY_FILE"
          [ -n "$TEST_FILES"  ] && echo "**test/**"  >> "$BODY_FILE" && echo "$TEST_FILES"  >> "$BODY_FILE"
          [ -n "$OTHER_FILES" ] && echo "**other/**" >> "$BODY_FILE" && echo "$OTHER_FILES" >> "$BODY_FILE"

          echo ""                                       >> "$BODY_FILE"
          echo "---"                                    >> "$BODY_FILE"
          echo "> _Auto-created by GitHub Actions on push to \`${BRANCH}\`_" >> "$BODY_FILE"

          # ── Export outputs ────────────────────────────────────────────────
          echo "title=${TITLE}"        >> "$GITHUB_OUTPUT"
          echo "body_file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Resolve base branch
        id: base
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use develop if it exists, otherwise fall back to main
          if git ls-remote --exit-code origin refs/heads/develop > /dev/null 2>&1; then
            echo "branch=develop" >> "$GITHUB_OUTPUT"
            echo "Base branch resolved to: develop"
          else
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "develop not found — falling back to: main"
          fi

      - name: Check if PR already exists
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --head "${GITHUB_REF_NAME}" \
            --base "${{ steps.base.outputs.branch }}" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "exists=true"          >> "$GITHUB_OUTPUT"
            echo "number=${EXISTING}"   >> "$GITHUB_OUTPUT"
            echo "PR #${EXISTING} already open — skipping creation."
          else
            echo "exists=false"         >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        id: create-pr
        if: steps.check-pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base "${{ steps.base.outputs.branch }}" \
            --head "${GITHUB_REF_NAME}" \
            --title "${{ steps.git-info.outputs.title }}" \
            --body-file "${{ steps.git-info.outputs.body_file }}")

          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "PR created: ${PR_URL}"

      - name: Write job summary
        if: always()
        run: |
          BASE="${{ steps.base.outputs.branch }}"
          if [ "${{ steps.check-pr.outputs.exists }}" = "true" ]; then
            echo "### ♻️ PR already exists — #${{ steps.check-pr.outputs.number }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ✅ PR created → ${BASE}"                  >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.create-pr.outputs.url }}"           >> "$GITHUB_STEP_SUMMARY"
          fi
