name: Auto Create Pull Request

# в”Ђв”Ђв”Ђ Triggers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Fires whenever a developer pushes to any branch except develop and main
on:
  push:
    branches-ignore:
      - develop
      - main

# в”Ђв”Ђв”Ђ Permissions в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
permissions:
  contents: read
  pull-requests: write

# в”Ђв”Ђв”Ђ Jobs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
jobs:
  create-pr:
    name: рџ”Ђ Auto-Create PR в†’ develop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect git info
        id: git-info
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          # в”Ђв”Ђ Title: feat/add-budget-report в†’ "feat: add budget report" в”Ђв”Ђв”Ђв”Ђв”Ђ
          PREFIX=$(echo "$BRANCH" | sed 's|/.*||')
          SLUG=$(echo "$BRANCH" | sed 's|[^/]*/||')
          READABLE=$(echo "$SLUG" | tr '-' ' ')
          TITLE="${PREFIX}: ${READABLE}"

          # в”Ђв”Ђ Commits not yet in develop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          git fetch origin develop 2>/dev/null || true
          COMMITS=$(git log origin/develop..HEAD --oneline --no-merges 2>/dev/null | head -20 || true)
          [ -z "$COMMITS" ] && COMMITS="No new commits compared to develop."

          # в”Ђв”Ђ Changed files by area в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          CHANGED=$(git diff --name-only origin/develop...HEAD 2>/dev/null | head -30 || true)
          DB_FILES=$(echo "$CHANGED"    | grep "^db/"   | sed 's/^/- /' || true)
          SRV_FILES=$(echo "$CHANGED"   | grep "^srv/"  | sed 's/^/- /' || true)
          TEST_FILES=$(echo "$CHANGED"  | grep "^test/" | sed 's/^/- /' || true)
          OTHER_FILES=$(echo "$CHANGED" | grep -vE "^(db|srv|test)/" | sed 's/^/- /' || true)

          # в”Ђв”Ђ Write PR body to a temp file (avoids all quoting issues) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          BODY_FILE="$(mktemp /tmp/pr-body.XXXXXX.md)"

          cat > "$BODY_FILE" <<'STATIC'
## Summary
Automated PR вЂ” update the summary below before merging.

## Type of Change
- [ ] рџђ› Bug fix
- [ ] вњЁ New feature
- [ ] в™»пёЏ Refactor
- [ ] рџ“– Documentation
- [ ] рџ”§ Config / CI

## Checklist
- [ ] Ran `cds watch` locally and tested manually
- [ ] `npx eslint .` passes locally
- [ ] `npx cds build --production` passes locally
- [ ] Linked to related issue (if any): Closes #___
STATIC

          # Append dynamic sections (no heredoc, no quoting issues)
          echo ""                                       >> "$BODY_FILE"
          echo "---"                                    >> "$BODY_FILE"
          echo "## Commits in this PR"                  >> "$BODY_FILE"
          echo '```'                                    >> "$BODY_FILE"
          echo "$COMMITS"                               >> "$BODY_FILE"
          echo '```'                                    >> "$BODY_FILE"

          echo ""                                       >> "$BODY_FILE"
          echo "## Changed Files"                       >> "$BODY_FILE"
          [ -n "$DB_FILES"    ] && echo "**db/**"    >> "$BODY_FILE" && echo "$DB_FILES"    >> "$BODY_FILE"
          [ -n "$SRV_FILES"   ] && echo "**srv/**"   >> "$BODY_FILE" && echo "$SRV_FILES"   >> "$BODY_FILE"
          [ -n "$TEST_FILES"  ] && echo "**test/**"  >> "$BODY_FILE" && echo "$TEST_FILES"  >> "$BODY_FILE"
          [ -n "$OTHER_FILES" ] && echo "**other/**" >> "$BODY_FILE" && echo "$OTHER_FILES" >> "$BODY_FILE"

          echo ""                                       >> "$BODY_FILE"
          echo "---"                                    >> "$BODY_FILE"
          echo "> _Auto-created by GitHub Actions on push to \`${BRANCH}\`_" >> "$BODY_FILE"

          # в”Ђв”Ђ Export outputs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          echo "title=${TITLE}"        >> "$GITHUB_OUTPUT"
          echo "body_file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Check if PR already exists
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --head "${GITHUB_REF_NAME}" \
            --base develop \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "exists=true"          >> "$GITHUB_OUTPUT"
            echo "number=${EXISTING}"   >> "$GITHUB_OUTPUT"
            echo "PR #${EXISTING} already open вЂ” skipping creation."
          else
            echo "exists=false"         >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        id: create-pr
        if: steps.check-pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base develop \
            --head "${GITHUB_REF_NAME}" \
            --title "${{ steps.git-info.outputs.title }}" \
            --body-file "${{ steps.git-info.outputs.body_file }}")

          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "PR created: ${PR_URL}"

      - name: Write job summary
        if: always()
        run: |
          if [ "${{ steps.check-pr.outputs.exists }}" = "true" ]; then
            echo "### в™»пёЏ PR already exists вЂ” #${{ steps.check-pr.outputs.number }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### вњ… PR created successfully"               >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.create-pr.outputs.url }}"           >> "$GITHUB_STEP_SUMMARY"
          fi
